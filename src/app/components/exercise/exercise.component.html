<app-home-button></app-home-button>

<main class="exercise-container">
  <div
    #exerciseContent
    class="exercise-content"
    tabindex="0"
    (keydown)="handleExerciseKeydown($event)"
  >
    <section
      class="exercise-body"
      [style.--stream-size-scale]="streamSizeScale"
    >
      <section class="exercise-stream-shell">
        <div class="stream-side stream-side-left">
          @for (previousChar of previousSideChars; track $index) {
            <span class="side-char">{{ previousChar }}</span>
          }
        </div>

        <div class="stream-zoom">
          @for (zoomChar of zoomWindowChars; track $index; let slotIndex = $index) {
            <span
              class="zoom-char"
              [class.active-zoom-char]="slotIndex === 2 && zoomChar !== null"
            >
              {{ zoomChar ?? '' }}
            </span>
          }
        </div>

        <div class="stream-side stream-side-right">
          @for (followingChar of followingSideChars; track $index) {
            <span class="side-char">{{ followingChar }}</span>
          }
        </div>
      </section>

      <section class="size-slider-shell">
        <input
          type="range"
          class="size-slider"
          [value]="streamSizeValue"
          [attr.min]="streamSizeMin"
          [attr.max]="streamSizeMax"
          step="any"
          aria-label="Adjust exercise stream size"
          (input)="handleStreamSizeInput($event)"
        >
      </section>

      <section class="exercise-focus-stack">
        <p
          class="key-display-box"
          aria-live="polite"
          aria-label="Last key pressed while running"
        >
          {{ displayedPressedKey }}
        </p>

        <button
          type="button"
          class="runtime-button"
          (click)="toggleRuntimeState()"
          [disabled]="isRuntimeControlDisabled"
        >
          {{ runtimeActionLabel }}
        </button>
      </section>
    </section>
  </div>
</main>
