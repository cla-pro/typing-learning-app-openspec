<app-home-button [destination]="'/reward-games'"></app-home-button>

<main class="tortoise-game-host-container">
  <section class="tortoise-game-host-content">
    <div class="tortoise-game-host-render-area">
      @if (config) {
        <app-tortoise-visualization
          [config]="config"
          [debugGrid]="true"
          (moveCompleted)="onMoveCompleted()"
        />
      }
    </div>

    @if (config) {
      <div class="tortoise-game-host-controls">
        <button
          type="button"
          class="runtime-button"
          [disabled]="isStartDisabled"
          (click)="startGame()"
        >
          {{ 'exercise.start' | translate }}
        </button>
      </div>
    }
  </section>
</main>
