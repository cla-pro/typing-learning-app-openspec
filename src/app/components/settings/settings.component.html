<app-home-button></app-home-button>

<main class="settings-container">
  <div class="settings-content">
    <h1>{{ 'settings.title' | translate }}</h1>

    <ul class="settings-list">
      <li class="setting-item">
        <label for="settings-layout" class="setting-label">{{ 'settings.layoutLabel' | translate }}</label>
        <select
          id="settings-layout"
          class="setting-control"
          (change)="onLayoutChange($event)"
        >
          @for (layout of supportedLayouts; track layout) {
            <option [value]="layout" [selected]="layout === selectedLayout">{{ layout }}</option>
          }
        </select>
      </li>

      <li class="setting-item">
        <label for="settings-language" class="setting-label">{{ 'settings.languageLabel' | translate }}</label>
        <select
          id="settings-language"
          class="setting-control"
          (change)="onLanguageChange($event)"
        >
          @for (language of supportedLanguages; track language) {
            <option [value]="language" [selected]="language === selectedLanguage">{{ ('settings.languages.' + language) | translate }}</option>
          }
        </select>
      </li>

      <li class="setting-item">
        <label for="settings-stream-size" class="setting-label">{{ 'settings.streamSizeLabel' | translate }}</label>
        <input
          id="settings-stream-size"
          type="range"
          class="setting-control"
          [value]="streamSizeValue"
          [attr.min]="streamSizeMin"
          [attr.max]="streamSizeMax"
          step="any"
          [attr.aria-label]="'settings.streamSizeAria' | translate"
          (input)="onStreamSizeInput($event)"
        >
      </li>
    </ul>
  </div>
</main>
