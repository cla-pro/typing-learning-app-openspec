<main class="welcome-container">
  <div class="welcome-content">
    <h1>Typing Learning</h1>

    <select id="layout-chooser" class="layout-chooser" [value]="selectedLayout" (change)="onLayoutChange($event)">
      @for (layout of supportedLayouts; track layout) {
        <option [value]="layout">{{ layout }}</option>
      }
    </select>

    <nav class="exercises-nav">
      @for (category of exerciseCategoriesWithProgress; track category.name) {
        <section class="exercise-category">
          <h3 class="exercise-category-title">{{ category.name }}</h3>

          <ul class="exercise-list">
            @for (tile of category.exercises; track tile.id) {
              <li>
                <a [routerLink]="['/exercices', tile.id]" class="exercise-link" [class.exercise-link--completed]="tile.completed">
                  {{ tile.name }}
                  @if (tile.completed) {
                    <span class="exercise-stars">{{ '★'.repeat(tile.stars) + '☆'.repeat(3 - tile.stars) }}</span>
                  }
                </a>
              </li>
            }
          </ul>
        </section>
      }
    </nav>
  </div>
</main>
