<section class="keyboard-display" aria-label="Keyboard layout display">
  @if (keymap; as resolvedKeymap) {
    @for (row of resolvedKeymap.rows; track $index) {
      <div class="keyboard-row">
        @for (key of row.keys; track $index) {
          <span
            class="keyboard-key"
            [class.keyboard-key-disabled]="!isKeyEnabled(key)"
            [class.keyboard-key-wide]="key.width === 'wide'"
            [class.keyboard-key-extra-wide]="key.width === 'extra-wide'"
            [class.keyboard-key-pressed-correct]="isKeyPressed(key) && !isLastKeyWrong"
            [class.keyboard-key-pressed-wrong]="isKeyPressed(key) && isLastKeyWrong"
            [attr.data-key-value]="key.value"
          >
            {{ getDisplayLabel(key) }}
          </span>
        }
      </div>
    }
  }
</section>
